<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Language" content="en">
  <meta name="google" content="notranslate">
  <title>Pokémon Dodge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }
    /* Canvas is 800×500 (16:10). Constrain so it never overflows viewport
       in either axis — works in landscape AND portrait on mobile. */
    #app {
      position: relative;
      width: min(800px, 100vw, calc(100dvh * 800 / 500));
    }
    #gameCanvas {
      width: 100%;
      display: block;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }
    #videoEl { display: none; }
    #statusDot {
      position: absolute;
      bottom: 12px;
      left: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      pointer-events: none;
    }
    #dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #888;
      transition: background 0.3s;
    }
    #dot.active { background: #1D9E75; }
    #statusLabel { font-size: 12px; color: rgba(255,255,255,0.6); }

    /* ── Mobile: overlay joystick layout ───────────────────────
       Joystick zones are absolutely positioned over the canvas
       at the bottom corners during gameplay. */

    /* Joystick overlay zones — hidden on desktop, absolute on mobile */
    #mc-left-zone,
    #mc-right-zone {
      display: none;
      position: absolute;
      bottom: 16px;
      width: 88px;
      height: 88px;
      visibility: hidden;
      pointer-events: none;
      touch-action: none;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      z-index: 10;
    }
    #mc-left-zone  { left: 12px; }
    #mc-right-zone { right: 12px; }
    body.mobile-mode #mc-left-zone,
    body.mobile-mode #mc-right-zone {
      display: flex;
    }
    body.mobile-mode #mc-left-zone.visible,
    body.mobile-mode #mc-right-zone.visible {
      visibility: visible;
      pointer-events: all;
    }

    /* ── Name entry modal (mobile) ──────────────────────────── */
    #name-modal {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(8, 8, 18, 0.88);
      align-items: center;
      justify-content: center;
      z-index: 40;
      border-radius: 12px;
    }
    #name-modal.visible { display: flex; }
    #name-modal-box {
      background: #12122a;
      border: 2px solid rgba(239, 159, 39, 0.55);
      border-radius: 10px;
      padding: 26px 28px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: min(300px, 78%);
      box-shadow: 0 0 40px rgba(239, 159, 39, 0.12);
    }
    #name-modal-title {
      font: bold 18px monospace;
      color: #f5d020;
      letter-spacing: 3px;
    }
    #name-modal-sub {
      font: 11px monospace;
      color: rgba(255, 255, 255, 0.45);
      text-align: center;
    }
    #name-modal-input {
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(239, 159, 39, 0.4);
      border-radius: 6px;
      color: #fff;
      font: bold 20px monospace;
      padding: 10px 14px;
      width: 100%;
      text-align: center;
      letter-spacing: 3px;
      outline: none;
      text-transform: uppercase;
      margin-top: 4px;
    }
    #name-modal-input::placeholder { color: rgba(255, 255, 255, 0.2); letter-spacing: 1px; }
    #name-modal-input:focus { border-color: rgba(239, 159, 39, 0.85); }
    #name-modal-btn {
      background: rgba(239, 159, 39, 0.88);
      border: 2px solid rgba(255, 210, 80, 0.55);
      color: #111;
      font: bold 15px monospace;
      padding: 10px 0;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 2px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      width: 100%;
      margin-top: 4px;
      box-shadow: 0 3px 0 rgba(0, 0, 0, 0.4);
    }
    #name-modal-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.4); }

    /* Joystick bases */
    #mc-left-base,
    #mc-right-base {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      position: relative;
      flex-shrink: 0;
    }
    #mc-left-base {
      background: rgba(0, 0, 0, 0.50);
      border: 2px solid rgba(255, 255, 255, 0.22);
    }
    #mc-right-base {
      background: rgba(120, 75, 0, 0.50);
      border: 2px solid rgba(239, 159, 39, 0.40);
    }

    /* Thumbs */
    #mc-left-thumb,
    #mc-right-thumb {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 42%;
      aspect-ratio: 1;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      will-change: transform;
    }
    #mc-left-thumb  { background: rgba(210, 210, 225, 0.80); }
    #mc-right-thumb { background: rgba(239, 159, 39, 0.90); }

    /* ── Mute button (top-right, always visible) ─────────────── */
    #mute-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.20);
      color: rgba(255, 255, 255, 0.90);
      font-size: 14px;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #mute-btn:hover { background: rgba(255, 255, 255, 0.12); }
    #mute-btn.muted { opacity: 0.55; }

    /* ── Mobile Start button (select screen) ─────────────────── */
    #start-btn {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(239, 159, 39, 0.88);
      border: 2px solid rgba(255, 210, 80, 0.6);
      color: #111;
      font: bold 16px monospace;
      padding: 10px 36px;
      border-radius: 8px;
      cursor: pointer;
      z-index: 20;
      display: none;
      letter-spacing: 2px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.45);
      white-space: nowrap;
    }
    #start-btn:active {
      transform: translateX(-50%) translateY(2px);
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.45);
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <video id="videoEl" autoplay playsinline width="640" height="480"></video>
    <div id="statusDot"><div id="dot"></div><span id="statusLabel">camera off</span></div>
    <button id="mute-btn" aria-label="Toggle sound (M)">🔊</button>
    <button id="start-btn" aria-label="Start game">START</button>
    <div id="name-modal">
      <div id="name-modal-box">
        <div id="name-modal-title">YOUR NAME</div>
        <div id="name-modal-sub">shown on the leaderboard<br>max 12 characters</div>
        <input id="name-modal-input" type="text" maxlength="12" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" placeholder="TRAINER">
        <button id="name-modal-btn">CONFIRM</button>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
