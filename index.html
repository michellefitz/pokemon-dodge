<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Language" content="en">
  <meta name="google" content="notranslate">
  <title>Pokémon Dodge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }
    /* Canvas is 800×500 (16:10). Constrain so it never overflows viewport
       in either axis — works in landscape AND portrait on mobile. */
    #app {
      position: relative;
      width: min(800px, 100vw, calc(100dvh * 800 / 500));
    }
    #gameCanvas {
      width: 100%;
      display: block;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }
    #videoEl { display: none; }
    #statusDot {
      position: absolute;
      bottom: 12px;
      left: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      pointer-events: none;
    }
    #dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #888;
      transition: background 0.3s;
    }
    #dot.active { background: #1D9E75; }
    #statusLabel { font-size: 12px; color: rgba(255,255,255,0.6); }

    /* ── Mobile virtual joystick overlay ──────────────────────── */
    #mobile-controls {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: none;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    #mobile-controls.visible { display: flex; }

    /* Left half — joystick zone */
    #mc-left-zone {
      flex: 1;
      pointer-events: all;
      display: flex;
      align-items: flex-end;
      padding: 0 0 9% 7%;
      touch-action: none;
    }

    /* Right half — fire zone */
    #mc-right-zone {
      flex: 1;
      pointer-events: all;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding: 0 7% 9% 0;
      touch-action: none;
    }

    /* Shared joystick base size — 28% of zone width */
    #mc-left-base,
    #mc-right-base {
      width: 28%;
      aspect-ratio: 1;
      border-radius: 50%;
      position: relative;
      flex-shrink: 0;
    }

    /* Left joystick — dark/neutral */
    #mc-left-base {
      background: rgba(0, 0, 0, 0.42);
      border: 2px solid rgba(255, 255, 255, 0.18);
    }

    /* Right joystick — amber (fire direction) */
    #mc-right-base {
      background: rgba(120, 75, 0, 0.42);
      border: 2px solid rgba(239, 159, 39, 0.35);
    }

    /* Shared thumb */
    #mc-left-thumb,
    #mc-right-thumb {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 42%;
      aspect-ratio: 1;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      will-change: transform;
    }

    #mc-left-thumb  { background: rgba(210, 210, 225, 0.75); }
    #mc-right-thumb { background: rgba(239, 159, 39, 0.85); }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <video id="videoEl" autoplay playsinline width="640" height="480"></video>
    <div id="statusDot"><div id="dot"></div><span id="statusLabel">camera off</span></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
