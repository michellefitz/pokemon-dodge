<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Language" content="en">
  <meta name="google" content="notranslate">
  <title>Pokémon Dodge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }
    /* Canvas is 800×500 (16:10). Constrain so it never overflows viewport
       in either axis — works in landscape AND portrait on mobile. */
    #app {
      position: relative;
      width: min(800px, 100vw, calc(100dvh * 800 / 500));
    }
    #gameCanvas {
      width: 100%;
      display: block;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }
    #videoEl { display: none; }
    #statusDot {
      position: absolute;
      bottom: 12px;
      left: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      pointer-events: none;
    }
    #dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #888;
      transition: background 0.3s;
    }
    #dot.active { background: #1D9E75; }
    #statusLabel { font-size: 12px; color: rgba(255,255,255,0.6); }

    /* ── Mobile: side-column joystick layout ───────────────────
       body becomes a flex row: [left zone] [canvas] [right zone]
       Zones are always in layout (visibility toggle) for stable canvas sizing. */

    body.mobile-mode {
      flex-direction: row;
      height: 100dvh;
      min-height: unset;
      align-items: center;
      justify-content: center;
    }

    /* Canvas on mobile — constrained by viewport height and space left after zones */
    body.mobile-mode #app {
      width: min(800px, calc(100dvh * 800 / 500), calc(100vw - 180px));
      flex-shrink: 1;
    }

    /* Side zones — always 90px wide in layout; invisible outside gameplay */
    #mc-left-zone,
    #mc-right-zone {
      display: none;            /* hidden on desktop */
      width: 90px;
      flex-shrink: 0;
      height: 100dvh;
      visibility: hidden;
      pointer-events: none;
      touch-action: none;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    body.mobile-mode #mc-left-zone,
    body.mobile-mode #mc-right-zone {
      display: flex;
    }
    body.mobile-mode #mc-left-zone.visible,
    body.mobile-mode #mc-right-zone.visible {
      visibility: visible;
      pointer-events: all;
    }

    /* Joystick bases */
    #mc-left-base,
    #mc-right-base {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      position: relative;
      flex-shrink: 0;
    }
    #mc-left-base {
      background: rgba(0, 0, 0, 0.50);
      border: 2px solid rgba(255, 255, 255, 0.22);
    }
    #mc-right-base {
      background: rgba(120, 75, 0, 0.50);
      border: 2px solid rgba(239, 159, 39, 0.40);
    }

    /* Thumbs */
    #mc-left-thumb,
    #mc-right-thumb {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 42%;
      aspect-ratio: 1;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      will-change: transform;
    }
    #mc-left-thumb  { background: rgba(210, 210, 225, 0.80); }
    #mc-right-thumb { background: rgba(239, 159, 39, 0.90); }

    /* ── Mute button (top-right, always visible) ─────────────── */
    #mute-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.20);
      color: rgba(255, 255, 255, 0.90);
      font-size: 14px;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #mute-btn:hover { background: rgba(255, 255, 255, 0.12); }
    #mute-btn.muted { opacity: 0.55; }

    /* ── Mobile Start button (select screen) ─────────────────── */
    #start-btn {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(239, 159, 39, 0.88);
      border: 2px solid rgba(255, 210, 80, 0.6);
      color: #111;
      font: bold 16px monospace;
      padding: 10px 36px;
      border-radius: 8px;
      cursor: pointer;
      z-index: 20;
      display: none;
      letter-spacing: 2px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.45);
      white-space: nowrap;
    }
    #start-btn:active {
      transform: translateX(-50%) translateY(2px);
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.45);
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <video id="videoEl" autoplay playsinline width="640" height="480"></video>
    <div id="statusDot"><div id="dot"></div><span id="statusLabel">camera off</span></div>
    <button id="mute-btn" aria-label="Toggle sound (M)">🔊</button>
    <button id="start-btn" aria-label="Start game">START</button>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
